name: Godot CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GODOT_VERSION: "4.4"

jobs:
  lint:
    name: Lint GDScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-gdtoolkit

      - name: Install gdtoolkit
        run: |
          python -m pip install --upgrade pip
          pip install "gdtoolkit==4.*"

      - name: Run gdlint
        run: |
          gdlint \
          scripts/ \
          scenes/

  validate-project:
    name: Validate Godot Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Import Assets
        run: |
          godot \
          --headless \
          --editor \
          --quit

      - name: Validate Project
        run: |
          godot \
          --headless \
          --path . \
          --quit

  export-linux:
    name: Export Linux Build
    runs-on: ubuntu-latest
    needs:
      - lint
      - validate-project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Setup Export Presets
        run: |
          cp export_presets.cfg export_presets.active.cfg || true

      - name: Import Assets
        run: |
          godot \
          --headless \
          --editor \
          --quit

      - name: Create Build Directory
        run: mkdir -p builds/linux

      - name: Export Linux
        run: |
          godot \
          --headless \
          --path . \
          --export-release "Linux" \
          builds/linux/game.x86_64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: builds/linux/
