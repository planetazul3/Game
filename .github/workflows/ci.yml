name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint with gdtoolkit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install gdtoolkit
        run: pip install gdtoolkit
      - name: Run gdlint
        run: gdlint .

  export-linux:
    name: Export for Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.4.0
          use-dotnet: false
      - name: Setup Export Presets
        run: cp export_presets.cfg.example export_presets.cfg
      - name: Export Linux Headless
        run: |
          mkdir -p builds/linux
          godot --headless --export-release "Linux/X11" builds/linux/game.x86_64
